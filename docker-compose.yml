version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: hrm_postgres
    environment:
      POSTGRES_DB: hrm_db
      POSTGRES_USER: hrm_user
      POSTGRES_PASSWORD: hrm_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - hrm_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hrm_user -d hrm_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: hrm_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://hrm_user:hrm_password_2024@db:5432/hrm_db
      - BIOMETRIC_DEVICE_IP=192.168.1.201
      - BIOMETRIC_DEVICE_PORT=4370
      - BIOMETRIC_DEVICE_PASSWORD=0
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hrm_network
    restart: unless-stopped
    privileged: true

  celery:
    build: .
    container_name: hrm_celery
    command: celery -A hrm_project worker -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://hrm_user:hrm_password_2024@db:5432/hrm_db
      - BIOMETRIC_DEVICE_IP=192.168.1.201
      - BIOMETRIC_DEVICE_PORT=4370
      - BIOMETRIC_DEVICE_PASSWORD=0
    depends_on:
      - db
      - redis
    networks:
      - hrm_network
    restart: unless-stopped

  celery-beat:
    build: .
    container_name: hrm_celery_beat
    command: celery -A hrm_project beat -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://hrm_user:hrm_password_2024@db:5432/hrm_db
      - BIOMETRIC_DEVICE_IP=192.168.1.201
      - BIOMETRIC_DEVICE_PORT=4370
      - BIOMETRIC_DEVICE_PASSWORD=0
    depends_on:
      - db
      - redis
    networks:
      - hrm_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hrm_redis
    ports:
      - "6379:6379"
    networks:
      - hrm_network
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:


networks:
  hrm_network:
    driver: bridge
