{% extends 'base.html' %}

{% block title %}{{ action }} Designation - HRM System{% endblock %}

{% block content %}
<h1>{{ action }} Designation</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}
        
        <div class="grid grid-2">
            <div class="form-group">
                <label for="name" class="form-label">Designation Name *</label>
                <input type="text" id="name" name="name" class="form-control" 
                       value="{{ designation.name|default:'' }}" required>
            </div>
            
            <div class="form-group">
                <label for="code" class="form-label">Code *</label>
                <input type="text" id="code" name="code" class="form-control" 
                       value="{{ designation.code|default:'' }}" required placeholder="e.g., SE, MGR, HR">
            </div>
        </div>
        
        <div class="form-group">
            <label for="department" class="form-label">Department</label>
            <select id="department" name="department" class="form-control">
                <option value="">Select Department (Optional)</option>
                {% for dept in departments %}
                <option value="{{ dept.id }}" {% if designation.department_id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" name="description" class="form-control" rows="3">{{ designation.description|default:'' }}</textarea>
        </div>
        
        <div class="form-group">
            <label style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" name="is_active" {% if designation.is_active or not designation %}checked{% endif %}>
                <span>Active</span>
            </label>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">{{ action }} Designation</button>
            <a href="{% url 'designation_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
