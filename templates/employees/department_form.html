{% extends 'base.html' %}

{% block title %}{{ action }} Department - HRM System{% endblock %}

{% block content %}
<h1>{{ action }} Department</h1>

<div class="card">
    <form method="post">
        {% csrf_token %}
        
        <div class="grid grid-2">
            <div class="form-group">
                <label for="name" class="form-label">Department Name *</label>
                <input type="text" id="name" name="name" class="form-control" 
                       value="{{ department.name|default:'' }}" required>
            </div>
            
            <div class="form-group">
                <label for="code" class="form-label">Code *</label>
                <input type="text" id="code" name="code" class="form-control" 
                       value="{{ department.code|default:'' }}" required placeholder="e.g., ENG, HR, SALES">
            </div>
        </div>
        
        <div class="form-group">
            <label for="description" class="form-label">Description</label>
            <textarea id="description" name="description" class="form-control" rows="3">{{ department.description|default:'' }}</textarea>
        </div>
        
        <div class="form-group">
            <label style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" name="is_active" {% if department.is_active or not department %}checked{% endif %}>
                <span>Active</span>
            </label>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">{{ action }} Department</button>
            <a href="{% url 'department_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
